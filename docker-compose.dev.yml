services:
  llm-proxy:
    build:
      context: ../copilot-llm-svc
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${LLM_PROXY_PORT:-5100}:5100"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  macgyver-dapr:
    volumes:
      - type: bind
        source: ./platform/components-dev
        target: /components-dev
        read_only: true
    command:
      - "./daprd"
      - "--app-id"
      - "macgyver"
      - "--app-port"
      - "3000"
      - "--app-protocol"
      - "http"
      - "--app-channel-address"
      - "127.0.0.1"
      - "--resources-path"
      - "/components"
      - "--resources-path"
      - "/components-dev"
      - "--dapr-http-port"
      - "3500"
      - "--placement-host-address"
      - " "
      - "--scheduler-host-address"
      - " "
      - "--log-level"
      - "info"
