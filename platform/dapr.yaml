# Dapr Multi-App Run File
# https://docs.dapr.io/developing-applications/local-development/multi-app-dapr-run/
version: 1
common:
  resourcesPath: ../platform/components
apps:
  - appID: macgyver
    appDirPath: ../agents/macgyver/src/
    appPort: 3000
    command: ["node", "--env-file-if-exists=.env", "index.mjs"]
