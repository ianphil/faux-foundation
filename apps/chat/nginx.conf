server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Authorization deadbolt — only allow the designated principal
    # Easy Auth sets X-MS-CLIENT-PRINCIPAL-ID for personal MS accounts
    # Note: personal account principal ID differs from Entra object ID
    set $allowed_principal "00000000-0000-0000-60b5-0cbd5f413b6d";
    if ($http_x_ms_client_principal_id != "") {
        set $auth_check "has_principal";
    }
    if ($http_x_ms_client_principal_id != $allowed_principal) {
        set $auth_check "${auth_check}_wrong";
    }
    if ($auth_check = "has_principal_wrong") {
        return 403;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Dapr sidecar calls (same network namespace via network_mode)
    location /v1.0/ {
        proxy_pass http://127.0.0.1:3500/v1.0/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }
}
