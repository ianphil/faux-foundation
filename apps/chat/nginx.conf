server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Authorization deadbolt — TEMPORARILY DISABLED for header debugging
    # set $allowed_principal "c9f3cf5c-93b3-4fce-96db-aceeea666766";
    # if ($http_x_ms_client_principal_id != "") {
    #     set $auth_check "has_principal";
    # }
    # if ($http_x_ms_client_principal_id != $allowed_principal) {
    #     set $auth_check "${auth_check}_wrong";
    # }
    # if ($auth_check = "has_principal_wrong") {
    #     return 403;
    # }

    # Temporary debug endpoint — hit /_debug/whoami to see Easy Auth headers
    location = /_debug/whoami {
        default_type text/plain;
        return 200 "principal-id: [$http_x_ms_client_principal_id]\nprincipal-name: [$http_x_ms_client_principal_name]\n";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Dapr sidecar calls (same network namespace via network_mode)
    location /v1.0/ {
        proxy_pass http://127.0.0.1:3500/v1.0/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }
}
